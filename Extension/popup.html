<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>

  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 44 44" fill="none">
          <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22C55E"/><stop offset="100%" stop-color="#4ade80"/></linearGradient></defs>
          <path d="M22 3.5L5 11v10c0 10 7.5 18.8 17 21 9.5-2.2 17-11 17-21V11L22 3.5z" fill="rgba(34,197,94,.08)" stroke="url(#sg)" stroke-width="1.4"/>
          <path d="M15 22.5l5 5 9-9" stroke="url(#sg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span><span class="txt-g">PHISH</span><span>GUARD</span></span>
      </div>
    </div>

    <!-- Current URL Status -->
    <div class="status-card lg" id="status-card">
      <div class="status-loading" id="status-loading">
        <div class="spinner"></div>
        <div>Analyzing current page...</div>
      </div>
      
      <div class="status-result" id="status-result" style="display:none">
        <div class="status-icon" id="status-icon"></div>
        <div class="status-text">
          <div class="status-label" id="status-label"></div>
          <div class="status-url" id="status-url"></div>
        </div>
        <div class="status-score" id="status-score"></div>
      </div>
    </div>

    <!-- Detailed Info -->
    <div class="details-section" id="details-section" style="display:none">
      <div class="detail-item">
        <span class="detail-label">SSL:</span>
        <span class="detail-value" id="detail-ssl"></span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Reputation:</span>
        <span class="detail-value" id="detail-reputation"></span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Risk Level:</span>
        <span class="detail-value" id="detail-risk"></span>
      </div>
    </div>

    <!-- Threat Flags -->
    <div class="threats-section" id="threats-section" style="display:none">
      <div class="threats-title">⚠️ Threat Indicators</div>
      <div id="threats-list"></div>
    </div>

    <!-- Actions -->
    <div class="actions-section">
      <button class="btn btn-primary" id="scan-btn" onclick="scanCurrentPage()">
        <span>🔍</span>
        <span>Scan This Page</span>
      </button>
      <button class="btn btn-secondary" onclick="openDashboard()">
        <span>📊</span>
        <span>View Dashboard</span>
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-section">
      <div class="stat-item">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Scans</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-blocked">0</div>
        <div class="stat-label">Blocked</div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
